  <!-- !DATALIST -->
  <label for="movies">Movies:</label>
  <input type="text" id="movies" list="prabhas">
  <datalist id="prabhas">
    <option>Bahubali</option>
    <option>Bahubali 2</option>
    <option>Salaar</option>
    <option>Darling</option>
    <option>Mirchi</option>
    <option>Billa</option>
    <option>Varsham</option>

    <option>Fauzi</option>
  </datalist>
  <hr>
  <!-- !FIGURE and FIGCAPTION -->
  <figure>
    <img src="./kayadu.avif" alt="kayadu lohar" height="400" width="270">
    <figcaption>Kayadu Lohar</figcaption>
  </figure>
  <hr>
  <!-- !OPTGROUP -->
  <label for="food">Food Items:</label>
  <select name="food" id="food">
    <option hidden>--Select Food--</option>
    <optgroup label="Veg Items">
      <option value="Paneer Biriyani">Paneer Biriyani</option>
      <option value="Mushroom Biryani">Mushroom Biryani</option>
      <option value="Veg Manchuria">Veg Manchuria</option>
    </optgroup>
    <optgroup label="Non Veg Items">
      <option value="Chicken Biryani">Chicken Biryani</option>
      <option value="Chicken 65">Chicken 65</option>
      <option value="Nalli Gosh">Nalli Gosh</option>
    </optgroup>
  </select>
