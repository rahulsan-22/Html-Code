<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elements 🙏</title>
</head>
<body style="border:2px dashed red;">
  <!-- BLOCK - LEVEL ELEMENTS -->
  <h1 style="border:3px solid green;">Good Morning Guys 😁</h1>
  <p style="border:3px solid blue;">Hello Everyone hope everything going well in your life</p>
  <!-- INLINE ELEMENTS -->
  <b style="border:5px solid tomato;">If not no worries its common</b>
  <i style="border:5px solid hotpink;">still depressed dont commit suicide</i>
</body>
</html>
